name: Build & Release (Windows)

# Same release pattern as TokenStep-Windows: push a v* tag (or run manually)
# and CI builds the installer + portable zip + CLI exe and attaches them to
# a GitHub Release with SHA-256 checksums.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pyinstaller
          pytest -q

      - name: Build Python sidecar (PyInstaller)
        run: |
          pyinstaller --onefile --name lanmigrate --add-data "lanmigrate/rules.toml;lanmigrate" -y entry.py
          New-Item -ItemType Directory -Force gui\src-tauri\binaries | Out-Null
          Copy-Item dist\lanmigrate.exe gui\src-tauri\binaries\lanmigrate-x86_64-pc-windows-msvc.exe -Force

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Build desktop app (Tauri + NSIS installer)
        working-directory: gui
        run: |
          npm ci
          npm run tauri build

      - name: Collect artifacts
        run: |
          $ver = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item gui\src-tauri\target\release\bundle\nsis\*.exe out\
          Compress-Archive -Path gui\src-tauri\target\release\lanmigrate-gui.exe, gui\src-tauri\target\release\lanmigrate.exe -DestinationPath "out\LanMigrate-$ver-portable-win64.zip"
          Copy-Item dist\lanmigrate.exe "out\lanmigrate-cli-$ver-win64.exe"
          Get-ChildItem out

      - uses: actions/upload-artifact@v4
        with:
          name: LanMigrate-win64
          path: out/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem out | ForEach-Object { $_.FullName }
          $notes = "### SHA-256`n"
          foreach ($f in $files) {
            $h = (Get-FileHash $f -Algorithm SHA256).Hash
            $notes += "- " + (Get-Item $f).Name + ": " + $h + "`n"
          }
          gh release delete $tag --yes
          if ($LASTEXITCODE -ne 0) { Write-Host "no existing release to replace" }
          gh release create $tag @files --title "LanMigrate $tag" --notes $notes --generate-notes
